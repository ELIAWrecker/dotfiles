import = [
  "/home/elia/.config/alacritty/colors.toml",
  "/home/elia/.config/alacritty/fonts.toml",
]
live_config_reload = true


[cursor]
unfocused_hollow = false

[cursor.style]
blinking = "On"
shape = "Block"

[env]
TERM = "alacritty"
WINIT_X11_SCALE_FACTOR = "1.0"

[window]
decorations = "full"
dynamic_title = true
opacity = 0.90
startup_mode = "Windowed"
[scrolling]
history = 10000
multiplier = 3

[window.dimensions]
columns = 82
lines = 24

[window.padding]
x = 30
y = 30
